services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rephrase
      POSTGRES_PASSWORD: rephrase
      POSTGRES_DB: rephrase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rephrase -d rephrase"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
