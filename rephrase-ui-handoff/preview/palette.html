<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rephrase colour palette</title>
  <style>
    * { box-sizing:border-box; }
    body {
      margin:0; padding:48px; background:#F6D5C3; color:#452317;
      font-family:Georgia,"Times New Roman",serif;
    }
    h1 {font-size:56px;letter-spacing:-.04em;font-weight:500;margin:0 0 32px}
    .grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px}
    .swatch {background:#FFF8F2;border:1px solid #E8C8B7;border-radius:24px;padding:14px;box-shadow:0 14px 34px rgba(87,47,32,.08)}
    .sample {height:120px;border-radius:16px;border:1px solid rgba(69,35,23,.12);margin-bottom:14px}
    strong,code {display:block}
    code {margin-top:6px;font-family:ui-monospace,monospace}
  </style>
</head>
<body>
  <h1>Rephrase palette</h1>
  <main class="grid"><div class="swatch"><div class="sample" style="background:#F6D5C3"></div><strong>Background peach</strong><code>#F6D5C3</code></div><div class="swatch"><div class="sample" style="background:#FFF8F2"></div><strong>Cream surface</strong><code>#FFF8F2</code></div><div class="swatch"><div class="sample" style="background:#FFFCF9"></div><strong>Elevated cream</strong><code>#FFFCF9</code></div><div class="swatch"><div class="sample" style="background:#452317"></div><strong>Cocoa text</strong><code>#452317</code></div><div class="swatch"><div class="sample" style="background:#572F20"></div><strong>Cocoa primary</strong><code>#572F20</code></div><div class="swatch"><div class="sample" style="background:#8A6252"></div><strong>Muted cocoa</strong><code>#8A6252</code></div><div class="swatch"><div class="sample" style="background:#F5C8BC"></div><strong>Blush</strong><code>#F5C8BC</code></div><div class="swatch"><div class="sample" style="background:#D8DDC8"></div><strong>Sage</strong><code>#D8DDC8</code></div><div class="swatch"><div class="sample" style="background:#7B8868"></div><strong>Sage strong</strong><code>#7B8868</code></div><div class="swatch"><div class="sample" style="background:#F7DDA7"></div><strong>Butter</strong><code>#F7DDA7</code></div><div class="swatch"><div class="sample" style="background:#E8C8B7"></div><strong>Soft border</strong><code>#E8C8B7</code></div></main>
</body>
</html>
